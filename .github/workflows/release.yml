name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.3.0)"
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Error: Version must be in format X.Y.Z"
            exit 1
          fi

      - name: Update manifest.json
        run: |
          jq --arg v "${{ inputs.version }}" '.version = $v' \
            custom_components/lynkco/manifest.json > manifest.tmp \
            && mv manifest.tmp custom_components/lynkco/manifest.json

      - name: Build changelog from commits since last tag
        id: changelog
        run: |
          last_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$last_tag" ]; then
            log=$(git log --pretty=format:"- %s (%h)" -- "custom_components/lynkco/")
          else
            log=$(git log "${last_tag}..HEAD" --pretty=format:"- %s (%h)" -- "custom_components/lynkco/")
          fi
          if [ -z "$log" ]; then
            log="- Minor changes"
          fi
          echo "log<<EOF" >> "$GITHUB_OUTPUT"
          echo "$log" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Commit version bump and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/lynkco/manifest.json
          git commit -m "Bump version to ${{ inputs.version }}"
          git push origin main

      - name: Delete all pre-releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --json tagName,isPrerelease -q '.[] | select(.isPrerelease) | .tagName' | \
            while read -r tag; do
              echo "Deleting pre-release $tag"
              gh release delete "$tag" --yes --cleanup-tag || true
            done

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="v${{ inputs.version }}"
          gh release create "$tag" \
            --title "$tag" \
            --notes "${{ steps.changelog.outputs.log }}" \
            --target main
