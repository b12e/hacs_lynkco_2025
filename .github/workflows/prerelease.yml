name: Pre-release

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "custom_components/lynkco/**"

jobs:
  prerelease:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get current version from manifest
        id: current
        run: |
          version=$(jq -r .version custom_components/lynkco/manifest.json)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Bump patch version for pre-release
        id: prerelease
        run: |
          IFS='.' read -r major minor patch <<< "${{ steps.current.outputs.version }}"
          new_patch=$((patch + 1))
          version="${major}.${minor}.${new_patch}-pr${{ github.event.pull_request.number }}"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Delete existing pre-release for this PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --json tagName,isPrerelease -q '.[] | select(.isPrerelease) | .tagName' | \
            grep "pr${{ github.event.pull_request.number }}\." | \
            while read -r tag; do
              echo "Deleting pre-release $tag"
              gh release delete "$tag" --yes --cleanup-tag || true
            done

      - name: Create pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="v${{ steps.prerelease.outputs.version }}"
          gh release create "$tag" \
            --title "$tag" \
            --notes "Pre-release from PR #${{ github.event.pull_request.number }}" \
            --prerelease \
            --target "${{ github.event.pull_request.head.sha }}"
